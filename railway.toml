[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && prisma db push --accept-data-loss && npx tsx prisma/seed.ts || true && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
