name: CI - Tests & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Tests & Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Lint code
        run: npm run lint

      - name: 🎨 Check formatting
        run: npm run format:check

      - name: 🏗️ Type check
        run: npm run type-check

      - name: 🗃️ Generate Prisma Client
        run: npm run db:generate

      - name: 🧪 Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: 🔗 Run integration tests (skip if no API key)
        run: npm run test:integration
        continue-on-error: true
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'fake-gemini-key' }}
          NODE_ENV: test

      - name: 🏗️ Build project
        run: npm run build
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'fake-gemini-key' }}

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.node-version == '20.x'
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: alfred-coverage

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    # Permettre au job de continuer même si certains tests échouent
    continue-on-error: false

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🗃️ Generate Prisma Client
        run: npm run db:generate

      - name: 🗃️ Setup database
        run: npm run db:push
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: test-secret-e2e

      - name: 🌱 Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: test-secret-e2e

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: test-secret-e2e
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'fake-gemini-key' }}
          CI: true
          NODE_ENV: test
        # Timeout de 15 minutes pour les tests E2E
        timeout-minutes: 15
        # Continuer même si certains tests échouent (pour debug)
        continue-on-error: false

      - name: 📊 Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-results
          path: test-results/junit.xml
          retention-days: 30

      - name: 📸 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📸 Upload test results (screenshots, videos, traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔒 Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
