name: CD - Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🗃️ Generate Prisma Client
        run: npm run db:generate

      - name: 🏗️ Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: production-secret
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kheinthein/alfred
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=kheinthein/alfred:buildcache
          cache-to: type=registry,ref=kheinthein/alfred:buildcache,mode=max

      - name: 📝 Image Info
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: kheinthein/alfred"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "🚀 To deploy, run on your server:"
          echo "docker pull kheinthein/alfred:latest"
          echo "docker-compose up -d"

